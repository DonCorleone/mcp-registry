apiVersion: v1
kind: Secret
metadata:
  name: mcp-registry-secret
  namespace: mcp-registry  # Anpassen falls anderer Namespace
type: Opaque
stringData:
  # PostgreSQL Connection String
  # Format: postgres://USER:PASSWORD@HOST:5432/DBNAME?sslmode=require
  # Beispiel mit OpenShift PostgreSQL Operator: postgres://mcpregistry:PASSWORD@postgresql:5432/mcpregistry?sslmode=disable
  DATABASE_URL: "postgres://USER:PASSWORD@HOST:5432/mcpregistry?sslmode=require"

  # JWT Private Key: 32-byte Hex-String
  # Generieren mit: openssl rand -hex 32
  JWT_PRIVATE_KEY: "HIER_OPENSSL_RAND_HEX_32_AUSGABE_EINTRAGEN"
